name: "Claude Agent: Triage"

on:
  issues:
    types: [labeled]

jobs:
  triage:
    if: >-
      github.event.label.name == 'agent' &&
      github.actor != '{{BOT_USER}}'
    uses: jnurre64/sandbox-pal-action/.github/workflows/sandbox-pal-triage.yml@v1
    with:
      bot_user: "{{BOT_USER}}"
    secrets:
      agent_pat: ${{ secrets.AGENT_PAT }}
