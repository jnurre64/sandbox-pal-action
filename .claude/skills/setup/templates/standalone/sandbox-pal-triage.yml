name: "Claude Agent: Triage"

on:
  issues:
    types: [labeled]

concurrency:
  group: sandbox-pal-triage-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  triage-issue:
    if: >-
      github.event.label.name == 'agent' &&
      github.actor != '{{BOT_USER}}'
    runs-on: [self-hosted, agent]
    timeout-minutes: 125
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run agent dispatch
        env:
          GH_TOKEN: ${{ secrets.AGENT_PAT }}
          GITHUB_TOKEN: ${{ secrets.AGENT_PAT }}
          AGENT_CONFIG: ${{ github.workspace }}/.sandbox-pal-dispatch/config.env  # override file (gitignored, optional)
        run: |
          .sandbox-pal-dispatch/scripts/sandbox-pal-dispatch.sh \
            new_issue \
            "${{ github.repository }}" \
            "${{ github.event.issue.number }}"
