name: "Claude Agent: PR Review"

on:
  pull_request_review:
    types: [submitted]

concurrency:
  group: sandbox-pal-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  handle-review:
    if: >-
      github.event.review.state == 'changes_requested' &&
      github.event.review.user.login != '{{BOT_USER}}'
    runs-on: [self-hosted, agent]
    timeout-minutes: 125
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run agent dispatch
        env:
          GH_TOKEN: ${{ secrets.AGENT_PAT }}
          GITHUB_TOKEN: ${{ secrets.AGENT_PAT }}
          AGENT_CONFIG: ${{ github.workspace }}/.sandbox-pal-dispatch/config.env  # override file (gitignored, optional)
        run: |
          .sandbox-pal-dispatch/scripts/sandbox-pal-dispatch.sh \
            pr_review \
            "${{ github.repository }}" \
            "${{ github.event.pull_request.number }}"
