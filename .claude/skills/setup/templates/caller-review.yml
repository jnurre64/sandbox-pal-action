name: "Claude Agent: PR Review"

on:
  pull_request_review:
    types: [submitted]

jobs:
  review:
    if: >-
      github.event.review.state == 'changes_requested' &&
      github.event.review.user.login != '{{BOT_USER}}'
    uses: jnurre64/sandbox-pal-action/.github/workflows/sandbox-pal-review.yml@v1
    with:
      bot_user: "{{BOT_USER}}"
    secrets:
      agent_pat: ${{ secrets.AGENT_PAT }}
