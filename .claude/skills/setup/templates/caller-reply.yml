name: "Claude Agent: Reply"

on:
  issue_comment:
    types: [created]

jobs:
  reply:
    if: >-
      github.event.comment.user.login != '{{BOT_USER}}' &&
      !github.event.issue.pull_request &&
      (contains(toJSON(github.event.issue.labels.*.name), 'agent:needs-info') ||
       contains(toJSON(github.event.issue.labels.*.name), 'agent:plan-review'))
    uses: jnurre64/sandbox-pal-action/.github/workflows/sandbox-pal-reply.yml@v1
    with:
      bot_user: "{{BOT_USER}}"
    secrets:
      agent_pat: ${{ secrets.AGENT_PAT }}
