name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck on scripts
        run: |
          shellcheck scripts/agent-dispatch.sh
          shellcheck scripts/cleanup.sh
          shellcheck scripts/lib/*.sh
          shellcheck scripts/check-prereqs.sh
          shellcheck scripts/create-labels.sh
          shellcheck scripts/setup.sh
          shellcheck scripts/update.sh

  bats:
    name: BATS Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Run BATS tests
        run: ./tests/bats/bin/bats tests/
